name: Trigger BuyFlow Deploy

on:
  push:
    branches:
      - master

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger buyflow-deploy workflow
        env:
          DEPLOY_PAT: ${{ secrets.DEPLOY_PAT }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DEPLOY_PAT" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/BuyFlow-ERP/buyflow-deploy/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"master"}'
